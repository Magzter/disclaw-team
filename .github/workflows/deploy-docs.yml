name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
        working-directory: docs
      - name: Build docs
        run: bun run build
        working-directory: docs
        env:
          BASE_PATH: /disclaw-team/docs
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Assemble site
        run: |
          mkdir -p site_out/docs
          cp docs/site/index.html site_out/index.html
          cp -r docs/dist/. site_out/docs/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site_out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
