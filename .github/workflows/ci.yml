name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Type check
        run: bunx tsc --noEmit
      - name: Build
        run: bun run build
      - name: Verify CLI runs
        run: node dist/cli/index.js --help
      - name: Verify package
        run: npm pack --dry-run
